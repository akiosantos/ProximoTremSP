<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Próximo Trem</title>

<style>
    body {
        font-family: Arial;
        margin: 0;
        background: #0f172a;
        color: white;
        text-align: center;
    }

    h1 {
        padding: 15px;
    }

    .botoes {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        padding: 10px;
    }

    button {
        padding: 12px 16px;
        border: none;
        border-radius: 10px;
        background: #2563eb;
        color: white;
        font-size: 14px;
        cursor: pointer;
    }

    iframe {
        width: 100%;
        height: 70vh;
        border: none;
        margin-top: 10px;
        background: white;
    }
</style>
</head>

<body>

<h1>🚆 Próximo Trem</h1>

<div class="botoes">

    <button onclick="carregar('L8','BRU')">Barueri</button>

    <!-- OSASCO COM DUAS LINHAS -->
    <button onclick="carregar('L8','OSA')">Osasco L8</button>
    <button onclick="carregar('L9','OSA')">Osasco L9</button>

    <button onclick="carregar('L8','JDI')">Jandira</button>
    <button onclick="carregar('L8','AJO')">Antônio João</button>
    <button onclick="carregar('L8','BFU')">Barra Funda</button>

</div>

<iframe id="trem"></iframe>

<script>
function carregar(linha, estacao) {
    let url = `https://proximotrem.viamobilidade.com.br/?linha=${linha}&estacao_origem=${estacao}`;
    document.getElementById("trem").src = url;
}

// já abre automaticamente em Barueri
window.onload = () => carregar('L8','BRU');
</script>

</body>
</html>
