<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Próximo Trem</title>

<style>
    body {
        font-family: Arial;
        margin: 0;
        background: #0f172a;
        color: white;
        text-align: center;
    }

    h1 {
        padding: 15px;
    }

    .botoes {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
        padding: 10px;
    }

    button {
        padding: 12px 16px;
        border: none;
        border-radius: 10px;
        background: #2563eb;
        color: white;
        font-size: 14px;
        cursor: pointer;
    }

    iframe {
        width: 100%;
        height: 75vh;
        border: none;
        margin-top: 10px;
        background: white;
    }
</style>
</head>

<body>

<h1>🚆 Próximo Trem</h1>

<div class="botoes">

    <button onclick="abrirURL('https://proximotrem.viamobilidade.com.br/?linha=L8&estacao_origem=BRU')">
        Barueri
    </button>

    <button onclick="abrirURL('https://proximotrem.viamobilidade.com.br/?linha=L8&estacao_origem=OSA')">
        Osasco - Linha 8
    </button>

    <button onclick="abrirURL('https://proximotrem.viamobilidade.com.br/?linha=L9&estacao_origem=OSA')">
        Osasco - Linha 9
    </button>

    <button onclick="abrirURL('https://proximotrem.viamobilidade.com.br/?linha=L8&estacao_origem=JDI')">
        Jandira
    </button>

    <button onclick="abrirURL('https://proximotrem.viamobilidade.com.br/?linha=L8&estacao_origem=AJO')">
        Antônio João
    </button>

    <button onclick="abrirURL('https://proximotrem.viamobilidade.com.br/?linha=L8&estacao_origem=BFU')">
        Barra Funda
    </button>

</div>

<iframe id="trem"></iframe>

<script>
function abrirURL(url) {
    document.getElementById("trem").src = url;
}

// abre automaticamente Barueri ao entrar
window.onload = () => {
    abrirURL('https://proximotrem.viamobilidade.com.br/?linha=L8&estacao_origem=BRU');
};
</script>

</body>
</html>
